<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drum Notation DAW - TATATAN inspired</title>
  <script src="https://cdn.jsdelivr.net/npm/@coderline/alphatab@latest/dist/alphaTab.js"></script>
  <style>
    :root{
      --bg:#0d0d1a;
      --panel:#181830;
      --panel2:#1e1e3a;
      --panel3:#242448;
      --text:#f0f0ff;
      --text-sub:#c0c0e0;
      --muted:#9090c0;
      --border:rgba(160,160,255,0.2);
      --border-bright:rgba(160,160,255,0.4);
      --accent1:#4ecdc4;
      --accent2:#ffe66d;
      --accent3:#ff6b35;
      --accent4:#c77dff;
      --step-off:#1a1a32;
      --step-on:#2a3958;
      --play:#ffffff;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    body::before{
      content:'';
      position:fixed; inset:0;
      background-image:
        linear-gradient(rgba(100,100,200,0.03) 1px,transparent 1px),
        linear-gradient(90deg,rgba(100,100,200,0.03) 1px,transparent 1px);
      background-size:32px 32px;
      pointer-events:none;
      z-index:0;
    }
    .app{
      position:relative; z-index:1;
      padding:10px;
      min-height:100vh;
    }
    .panel{
      background:var(--panel2);
      border:1px solid var(--border);
      border-radius:16px;
      overflow:hidden;
      box-shadow:0 10px 30px rgba(0,0,0,.22);
    }
    .toolbar{
      position:sticky; top:0; z-index:10;
      display:flex; flex-wrap:wrap; gap:10px; align-items:center; justify-content:space-between;
      padding:10px;
      margin-bottom:10px;
      background:rgba(13,13,26,.92);
      backdrop-filter:blur(10px);
      border:1px solid var(--border);
      border-radius:16px;
    }
    .toolbar-left,.toolbar-right{display:flex; flex-wrap:wrap; gap:8px; align-items:center;}
    .btn,.pill,.file-label{
      min-height:44px;
      padding:0 14px;
      border-radius:12px;
      border:1px solid var(--border-bright);
      background:var(--panel3);
      color:var(--text);
      cursor:pointer;
      font:inherit;
    }
    .btn.primary{background:linear-gradient(135deg,#a8ff78,#4ecdc4);color:#081018;border:none;font-weight:700}
    .btn.stop{background:linear-gradient(135deg,#ff6b35,#ff6b9d);border:none}
    .btn.warn{background:linear-gradient(135deg,#ffe66d,#ff9f43);color:#111;border:none}
    .pill{
      display:flex; align-items:center; gap:8px; padding:0 10px;
      background:var(--panel);
    }
    .pill label{
      color:var(--text-sub); font-size:.9rem;
    }
    input[type=number], select, textarea{
      font:inherit;
    }
    .num, .sel{
      background:transparent; color:var(--text); border:none; outline:none;
    }
    .num{width:72px}
    .gm-bar{
      display:flex; flex-wrap:wrap; gap:8px;
      margin-bottom:10px;
    }
    .gm-group{
      display:flex; border:1px solid var(--border); border-radius:12px; overflow:hidden;
      background:var(--panel);
    }
    .gm-title{
      padding:10px 10px; font-size:.78rem; color:var(--text-sub); letter-spacing:.08em;
      border-right:1px solid var(--border);
      display:flex; align-items:center;
    }
    .gm-btn{
      min-height:40px; padding:0 10px; border:none; background:transparent; color:var(--muted); cursor:pointer;
      border-right:1px solid rgba(255,255,255,.06);
      font-weight:600;
    }
    .gm-btn:last-child{border-right:none}
    .gm-btn.active{background:linear-gradient(135deg,#4ecdc4,#a8ff78); color:#081018}
    .main{
      display:grid; gap:10px;
    }
    .panel-head{
      padding:12px 14px 10px; border-bottom:1px solid var(--border);
      display:flex; flex-wrap:wrap; justify-content:space-between; gap:8px;
    }
    .panel-head h2{margin:0; font-size:1.02rem}
    .panel-head p{margin:0; color:var(--text-sub); font-size:.9rem}
    .grid-scroll,.json-scroll{overflow:auto; padding:12px}
    .score-scroll{overflow:auto; padding:12px; background:#fff; border-radius:12px; margin:8px}
    .ruler,.row{
      display:grid;
      grid-template-columns:120px 1fr;
      gap:8px;
      min-width:max-content;
      align-items:center;
    }
    .ruler{margin-bottom:8px}
    .r-label,.label{
      border:1px solid var(--border); background:var(--panel3); border-radius:12px; min-height:44px;
      padding:8px 10px; display:flex; flex-direction:column; justify-content:center;
    }
    .l1{font-weight:700}
    .l2{font-size:.78rem; color:var(--text-sub)}
    .cells{
      display:grid; grid-auto-flow:column; gap:4px;
      grid-auto-columns:32px;
    }
    .r-cell{
      height:26px; display:flex; align-items:center; justify-content:center;
      color:var(--text-sub); font-size:.72rem;
    }
    .cell{
      width:32px; height:46px; border:none; cursor:pointer; border-radius:10px;
      background:var(--step-off);
      position:relative;
      border-left:1px solid rgba(255,255,255,.07);
      transition:background .08s, transform .08s, box-shadow .08s;
    }
    .cell:hover{background:#242448}
    .cell:active{transform:scale(.96)}
    .cell.on{background:var(--accentColor,#4ecdc4); box-shadow:inset 0 0 0 1px rgba(255,255,255,.15)}
    .cell.playing{box-shadow:inset 0 0 0 2px rgba(255,255,255,.9); filter:brightness(1.25)}
    .cell.beat{border-left:1px solid rgba(255,255,255,.18)}
    .cell.bar{border-left:2px solid rgba(255,230,109,.35)}
    .cell.orn-accent{border-top:3px solid #ff6b35!important}
    .cell.orn-ghost{outline:2px dashed rgba(180,180,255,.5); outline-offset:-2px}
    .cell.orn-buzz{background-image:repeating-linear-gradient(45deg,transparent,transparent 4px, rgba(255,107,157,.12) 4px, rgba(255,107,157,.12) 8px)}
    .badge{
      position:absolute; top:2px; left:2px; font-size:9px; line-height:1; z-index:2; pointer-events:none;
      padding:1px 3px; border-radius:3px; font-weight:bold; font-family:monospace;
    }
    .badge.fl{background:#ffe66d;color:#1a1400}
    .badge.dr{background:#ff9f43;color:#1a0800}
    .badge.gh{background:rgba(160,160,220,.9);color:#080810}
    .badge.ac{background:#ff6b35;color:#fff}
    .badge.rm{background:#4ecdc4;color:#080810}
    .badge.cr{background:#c77dff;color:#080810}
    .badge.bz{background:#ff6b9d;color:#fff}
    .note-label{
      position:absolute; bottom:2px; left:0; right:0; text-align:center; font-size:8px; color:rgba(255,255,255,.85);
      pointer-events:none;
    }
    .subbar{
      padding:0 14px 14px; color:var(--text-sub); font-size:.9rem; display:flex; flex-wrap:wrap; gap:12px;
    }
    .legend{display:flex; gap:6px; flex-wrap:wrap}
    .legend span{padding:4px 8px; border:1px solid var(--border); border-radius:999px; font-size:.8rem; background:var(--panel)}
    .json-text{
      width:100%; min-height:150px; resize:vertical;
      background:#0f141a; color:var(--text); border:1px solid var(--border); border-radius:12px; padding:12px;
    }
    .json-actions{display:flex; gap:8px; flex-wrap:wrap; padding-top:10px}
    .hint{color:var(--text-sub); font-size:.86rem}
    .orn-pop{
      position:fixed; z-index:50; display:none;
      background:#0f0f28; border:1px solid rgba(255,230,109,.28); border-radius:12px; padding:8px; min-width:170px;
      box-shadow:0 12px 32px rgba(0,0,0,.5);
    }
    .orn-pop.open{display:block}
    .orn-title{font-size:.78rem; color:var(--text-sub); letter-spacing:.08em; padding:0 4px 6px; border-bottom:1px solid var(--border); margin-bottom:6px}
    .orn-item{
      display:flex; align-items:center; gap:8px; padding:7px 8px; border-radius:8px; cursor:pointer; font-size:.92rem;
    }
    .orn-item:hover{background:rgba(255,255,255,.08)}
    .orn-item.active{color:#ffe66d}
    @media (max-width:640px){
      .app{padding:8px}
      .ruler,.row{grid-template-columns:82px 1fr}
      .l2{display:none}
      .cells{grid-auto-columns:34px}
      .cell{width:34px}
    }
  </style>
</head>
<body>
<div class="app">
  <div class="toolbar">
    <div class="toolbar-left">
      <button id="playBtn" class="btn primary">▶ PLAY</button>
      <button id="stopBtn" class="btn stop">■ STOP</button>
      <button id="clearBtn" class="btn">CLEAR</button>
    </div>
    <div class="toolbar-right">
      <div class="pill" style="gap:6px">
        <label>BPM</label>
        <input id="bpmSlider" type="range" min="40" max="240" value="120" style="width:70px;accent-color:#a8ff78;cursor:pointer;vertical-align:middle">
        <input id="bpmInput" class="num" type="number" min="40" max="240" value="120">
      </div>
      <div class="pill">
        <label>BARS</label>
        <select id="barsInput" class="sel">
          <option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option>
        </select>
      </div>
      <div class="pill">
        <label>SWING</label>
        <select id="feelInput" class="sel">
          <option value="straight">STRAIGHT</option>
          <option value="swing8">SWING 8</option>
          <option value="shuffle16">SHUFFLE 16</option>
        </select>
      </div>
      <button id="saveJsonBtn" class="btn">JSON保存</button>
      <button id="samplerBtn" class="btn">&#127925; 音源</button>
      <button id="analyzeBtn" class="btn" style="background:#1a3a1a;border-color:#a8ff78;color:#a8ff78">&#127908; 解析</button>
      <button id="saveHtmlBtn" class="btn">HTML保存</button>
      <button id="midiBtn" class="btn warn">MIDI</button>
      <label class="file-label">JSON読込<input id="jsonFile" type="file" accept="application/json,.json" hidden></label>
    </div>
  </div>

  <div class="gm-bar">
    <div class="gm-group">
      <div class="gm-title">STRAIGHT</div>
      <button class="gm-btn" data-mode="q">4分</button>
      <button class="gm-btn" data-mode="e">8分</button>
      <button class="gm-btn active" data-mode="s">16分</button>
      <button class="gm-btn" data-mode="t32">32分</button>
    </div>
    <div class="gm-group">
      <div class="gm-title">TUPLET</div>
      <button class="gm-btn" data-mode="t3">3連</button>
      <button class="gm-btn" data-mode="t5">5連</button>
      <button class="gm-btn" data-mode="t6">6連</button>
      <button class="gm-btn" data-mode="t7">7連</button>
    </div>
  </div>

  <div class="main">
    <section class="panel">
      <div class="panel-head">
        <h2>ドラムグリッド</h2>
        <p>リアルタイム譜面表示は維持 / TATATAN風のリズムモード・装飾音符対応</p>
      </div>
      <div class="grid-scroll">
        <div id="gridRoot"></div>
      </div>
      <div class="subbar">
        <div id="statusLine"></div>
        <div class="legend">
          <span>右クリック / 長押し: Ornament</span>
          <span>FL</span><span>DR</span><span>GH</span><span>AC</span><span>RM</span><span>CR</span><span>BZ</span>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>ドラム譜面</h2>
        <p>AlphaTab による本格記譜</p>
      </div>
      <div class="score-scroll">
        <div id="scoreDiv"></div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>JSON</h2>
        <p>貼り付け / 復元 / コピー用</p>
      </div>
      <div class="json-scroll">
        <textarea id="jsonArea" class="json-text"></textarea>
        <div class="json-actions">
          <button id="applyJsonBtn" class="btn">このJSONを適用</button>
          <button id="copyJsonBtn" class="btn">JSONコピー</button>
        </div>
      </div>
    </section>
  </div>
</div>

<div id="ornPop" class="orn-pop"></div>
<div id="analyzeModal" style="display:none;position:fixed;inset:0;z-index:110;background:rgba(0,0,0,0.82);align-items:center;justify-content:center">
  <div style="background:#13132a;border:1px solid rgba(168,255,120,0.35);border-radius:16px;width:min(460px,94vw);display:flex;flex-direction:column;overflow:hidden">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid rgba(168,255,120,0.2);font-weight:700;color:#a8ff78">
      <span>&#127908; ドラム音源解析</span>
      <button onclick="document.getElementById('analyzeModal').style.display='none'" class="btn" style="min-height:30px;padding:0 10px">&#10005;</button>
    </div>
    <div style="padding:14px;display:flex;flex-direction:column;gap:10px">
      <div style="font-size:.8rem;color:#9090b8;background:#0a0a1a;border-radius:8px;padding:9px 11px;border:1px solid rgba(168,255,120,0.12)">
        Moises等で分離済みのドラム単体音源を読み込んでください。未分離では精度が低下します。
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <label class="btn" style="cursor:pointer;flex:1;text-align:center;font-size:.85rem">
          &#128193; 音源を選択
          <input id="analyzeFileInput" type="file" accept=".wav,.mp3,.m4a,audio/*" hidden>
        </label>
        <span id="analyzeFileName" style="font-size:.78rem;color:#9090b8;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">未選択</span>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <span style="font-size:.8rem;color:#9090b8;white-space:nowrap">BPM（空=自動）</span>
        <input id="analyzeBpmHint" type="number" min="40" max="240" placeholder="自動" style="background:#0a0a1a;border:1px solid var(--border);color:#ffe66d;border-radius:6px;padding:4px 7px;width:72px;font-size:.88rem">
        <span style="font-size:.8rem;color:#9090b8;white-space:nowrap">小節数</span>
        <select id="analyzeBarsHint" style="background:#0a0a1a;border:1px solid var(--border);color:#fff;border-radius:6px;padding:4px 7px">
          <option value="1">1</option><option value="2">2</option><option value="4" selected>4</option><option value="8">8</option>
        </select>
      </div>
      <div id="analyzeProgWrap" style="display:none">
        <div style="background:#1a1a2e;border-radius:4px;height:6px;overflow:hidden">
          <div id="analyzeProgBar" style="height:100%;width:0%;background:#a8ff78;transition:width .12s;border-radius:4px"></div>
        </div>
        <div id="analyzeProgLabel" style="font-size:.75rem;color:#9090b8;margin-top:3px">解析中...</div>
      </div>
      <button id="analyzeStartBtn" class="btn" disabled style="background:#a8ff78;color:#000;font-weight:700;border:none;font-size:.95rem;padding:9px">解析開始</button>
      <div id="analyzeResultMsg" style="font-size:.8rem;color:#a8ff78;display:none;text-align:center"></div>
    </div>
  </div>
</div>

<div id="samplerModal" style="display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.75);align-items:center;justify-content:center">
  <div style="background:#13132a;border:1px solid rgba(160,160,255,0.3);border-radius:16px;width:min(520px,94vw);max-height:80vh;display:flex;flex-direction:column;overflow:hidden">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid rgba(160,160,255,0.2);font-weight:700">
      <span>&#127925; 音源設定</span>
      <button onclick="document.getElementById('samplerModal').style.display='none'" class="btn" style="min-height:32px;padding:0 10px">&#10005;</button>
    </div>
    <div id="samplerBody" style="overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px"></div>
  </div>
</div>
<div id="velPop" style="display:none;position:fixed;z-index:60;background:#0f0f28;border:1px solid rgba(255,230,109,.28);border-radius:12px;padding:12px 14px;min-width:160px;box-shadow:0 12px 32px rgba(0,0,0,.6)">
  <div style="font-size:.78rem;color:#9090b8;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:8px">ベロシティ</div>
  <input id="velSlider" type="range" min="1" max="127" value="100" style="width:100%;accent-color:#ffe66d;display:block;margin-bottom:4px">
  <div id="velVal" style="text-align:center;font-size:1.1rem;font-weight:700;color:#ffe66d">100</div>
  <div style="display:flex;gap:6px;margin-top:8px">
    <button onclick="applyVelocity()" class="btn" style="flex:1;min-height:32px;font-size:.85rem">適用</button>
    <button onclick="document.getElementById('velPop').style.display='none'" class="btn" style="min-height:32px;padding:0 8px">&#10005;</button>
  </div>
</div>

<script>
const STORAGE_KEY = 'tatatan-inspired-drum-notation';
const GRID_MODES = {
  q:   { label:'4分',  stepsPerBeat:1 },
  e:   { label:'8分',  stepsPerBeat:2 },
  s:   { label:'16分', stepsPerBeat:4 },
  t32: { label:'32分', stepsPerBeat:8 },
  t3:  { label:'3連',  stepsPerBeat:3 },
  t5:  { label:'5連',  stepsPerBeat:5 },
  t6:  { label:'6連',  stepsPerBeat:6 },
  t7:  { label:'7連',  stepsPerBeat:7 }
};
const ORNAMENTS = [
  { id:'none',  label:'なし', short:'' },
  { id:'flam',  label:'フラム', short:'FL' },
  { id:'drag',  label:'ドラッグ', short:'DR' },
  { id:'ghost', label:'ゴースト', short:'GH' },
  { id:'accent',label:'アクセント', short:'AC' },
  { id:'rim',   label:'リムショット', short:'RM' },
  { id:'cross', label:'クロススティック', short:'CR' },
  { id:'buzz',  label:'バズロール', short:'BZ' }
];
const TRACKS = [
  { id:'crash',       label:'Crash',      short:'CR', accent:'#c77dff', group:'cymbal', scoreY:46,  voice:'upper', midiNote:49, xHead:true },
  { id:'ride',        label:'Ride',       short:'RD', accent:'#9b5de5', group:'cymbal', scoreY:53,  voice:'upper', midiNote:51, xHead:true },
  { id:'cup',         label:'Ride Cup',   short:'CU', accent:'#7b4de5', group:'cymbal', scoreY:53,  voice:'upper', midiNote:53, xHead:true },
  { id:'open_hihat',  label:'Open HH',    short:'OH', accent:'#ffd166', group:'hihat',  scoreY:53,  voice:'upper', midiNote:46, xHead:true },
  { id:'closed_hihat',label:'Closed HH',  short:'CH', accent:'#ffe66d', group:'hihat',  scoreY:60,  voice:'upper', midiNote:42, xHead:true },
  { id:'tom10',       label:'Tom 10"',    short:'T1', accent:'#f87171', group:'tom',    scoreY:81,  voice:'lower', midiNote:48 },
  { id:'tom12',       label:'Tom 12"',    short:'T2', accent:'#fb923c', group:'tom',    scoreY:88,  voice:'lower', midiNote:47 },
  { id:'tom16',       label:'Floor Tom',  short:'FT', accent:'#fbbf24', group:'tom',    scoreY:116, voice:'lower', midiNote:43 },
  { id:'snare',       label:'Snare',      short:'S',  accent:'#ff6b35', group:'snare',  scoreY:102, voice:'lower', midiNote:38 },
  { id:'rimshot',     label:'Closed Rim', short:'RM', accent:'#a0c4ff', group:'snare',  scoreY:109, voice:'lower', midiNote:37 },
  { id:'kick',        label:'Kick',       short:'K',  accent:'#4ecdc4', group:'kick',   scoreY:123, voice:'lower', midiNote:36 },
];

const DEFAULT = {
  bpm: 120,
  measures: 1,
  timeSignature: '4/4',
  gridMode: 's',
  feelMode: 'straight',
  events: [
    { track:'kick', step:0, velocity:112 },
    { track:'kick', step:8, velocity:112 },
    { track:'snare', step:4, velocity:102 },
    { track:'snare', step:12, velocity:102 },
    { track:'closed_hihat', step:0, velocity:80 },
    { track:'closed_hihat', step:2, velocity:80 },
    { track:'closed_hihat', step:4, velocity:80 },
    { track:'closed_hihat', step:6, velocity:80 },
    { track:'closed_hihat', step:8, velocity:80 },
    { track:'closed_hihat', step:10, velocity:80 },
    { track:'closed_hihat', step:12, velocity:80 },
    { track:'closed_hihat', step:14, velocity:80 }
  ],
  ornaments: {}
};

const state = {
  pattern: loadPattern(),
  isPlaying: false,
  scheduleStep: 0,   // スケジューリング用（先読み）
  drawStep: 0,       // 表示用（現在再生中の拍）
  nextNoteTime: 0,
  scheduleAheadTime: 0.12,
  lookahead: 25,
  schedulerId: null,
  rafId: null,
  audioContext: null
};

const gridRoot = document.getElementById('gridRoot');
const scoreSvg = document.getElementById('scoreSvg');
const statusLine = document.getElementById('statusLine');
const bpmInput = document.getElementById('bpmInput');
const barsInput = document.getElementById('barsInput');
const feelInput = document.getElementById('feelInput');
const jsonArea = document.getElementById('jsonArea');
const ornPop = document.getElementById('ornPop');

function totalSteps(){
  return state.pattern.measures * 4 * GRID_MODES[state.pattern.gridMode].stepsPerBeat;
}
function spb(){ return GRID_MODES[state.pattern.gridMode].stepsPerBeat; }

function clampBpm(v){ return Math.max(40, Math.min(240, Number(v)||120)); }
function clampMeasures(v){ return Math.max(1, Math.min(4, Number(v)||1)); }

function normalizePattern(raw){
  const gridMode = GRID_MODES[raw.gridMode] ? raw.gridMode : 's';
  const measures = clampMeasures(raw.measures);
  const feelMode = ['straight','swing8','shuffle16'].includes(raw.feelMode) ? raw.feelMode : 'straight';
  const max = measures * 4 * GRID_MODES[gridMode].stepsPerBeat;
  const events = Array.isArray(raw.events) ? raw.events.filter(e => e.step < max) : [];
  const ornaments = raw.ornaments && typeof raw.ornaments === 'object' ? raw.ornaments : {};
  return {
    bpm: clampBpm(raw.bpm),
    measures,
    timeSignature: '4/4',
    gridMode,
    feelMode,
    events: events.sort((a,b)=>a.step-b.step),
    ornaments
  };
}
function loadPattern(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return structuredClone(DEFAULT);
    return normalizePattern(JSON.parse(raw));
  }catch{
    return structuredClone(DEFAULT);
  }
}
function savePattern(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state.pattern));
  jsonArea.value = JSON.stringify(state.pattern, null, 2);
}
function activeEvent(track, step){
  return state.pattern.events.find(e => e.track===track && e.step===step);
}
function toggleStep(track, step){
  const found = activeEvent(track, step);
  if(found){
    state.pattern.events = state.pattern.events.filter(e => !(e.track===track && e.step===step));
    delete state.pattern.ornaments[ornKey(track, step)];
  }else{
    state.pattern.events.push({ track, step, velocity: 100 });
    state.pattern.events.sort((a,b)=>a.step-b.step);
  }
  savePattern();
  renderAll();
}
function ornKey(track, step){ return `${state.pattern.gridMode}|${track}|${step}`; }
function getOrn(track, step){ return state.pattern.ornaments[ornKey(track, step)] || null; }
function setOrn(track, step, type){
  const key = ornKey(track, step);
  if(!type || type==='none') delete state.pattern.ornaments[key];
  else state.pattern.ornaments[key] = type;
  savePattern();
  renderAll();
}

function renderGrid(){
  const tot = totalSteps();
  let html = '';
  html += '<div class="ruler"><div class="r-label"><div class="l1">Inst</div><div class="l2">'+GRID_MODES[state.pattern.gridMode].label+'</div></div><div class="cells">';
  for(let s=0;s<tot;s++){
    const beatIndex = Math.floor(s / spb()) + 1;
    html += `<div class="r-cell">${beatIndex}</div>`;
  }
  html += '</div></div>';

  for(const tr of TRACKS){
    html += '<div class="row">';
    html += `<div class="label"><div class="l1" style="color:${tr.accent}">${tr.short}</div><div class="l2">${tr.label}</div></div><div class="cells">`;
    for(let s=0;s<tot;s++){
      const ev = activeEvent(tr.id, s);
      const orn = getOrn(tr.id, s);
      const cls = ['cell'];
      if(ev) cls.push('on');
      if(state.isPlaying && s===state.drawStep) cls.push('playing');
      if(s % spb()===0) cls.push('beat');
      if(s % (spb()*4)===0) cls.push('bar');
      if(orn==='accent') cls.push('orn-accent');
      if(orn==='ghost') cls.push('orn-ghost');
      if(orn==='buzz') cls.push('orn-buzz');
      html += `<button class="${cls.join(' ')}" data-track="${tr.id}" data-step="${s}" style="${ev?`--accentColor:${tr.accent}`:''}">`;
      if(orn){
        const short = ORNAMENTS.find(o=>o.id===orn)?.short || '';
        html += `<span class="badge ${short.toLowerCase()}">${short}</span>`;
      }
      if(ev){
        html += `<span class="note-label">${tr.short}</span>`;
        const vw=Math.round((ev.velocity||100)/127*100);
        html += '<span style="position:absolute;bottom:2px;left:3px;right:3px;height:3px;background:rgba(255,255,255,0.45);border-radius:2px;pointer-events:none;width:'+vw+'%"></span>';
      }
      html += '</button>';
    }
    html += '</div></div>';
  }
  gridRoot.innerHTML = html;
  attachGridEvents();
}
function renderPlayhead(){
  // グリッド全体を再生成せず、playing クラスだけ付け替える（高効率）
  gridRoot.querySelectorAll('.cell').forEach(btn=>{
    const s = Number(btn.dataset.step);
    btn.classList.toggle('playing', s === state.drawStep);
  });
}
function attachGridEvents(){
  let longPressTimer = null;
  let pressTarget = null;
  gridRoot.querySelectorAll('.cell').forEach(btn=>{
    btn.addEventListener('click', e=>{
      if(btn.dataset.longpress === '1'){
        btn.dataset.longpress = '0';
        return;
      }
      toggleStep(btn.dataset.track, Number(btn.dataset.step));
    });
    btn.addEventListener('contextmenu', e=>{
      e.preventDefault();
      if(btn.classList.contains('on')){
        showVelPop(btn.dataset.track, Number(btn.dataset.step), e.clientX, e.clientY);
      }else{
        openOrnPopup(btn.dataset.track, Number(btn.dataset.step), e.clientX, e.clientY);
      }
    });
    btn.addEventListener('touchstart', e=>{
      pressTarget = btn;
      longPressTimer = setTimeout(()=>{
        btn.dataset.longpress = '1';
        const touch = e.touches[0];
        openOrnPopup(btn.dataset.track, Number(btn.dataset.step), touch.clientX, touch.clientY);
      }, 450);
    }, {passive:true});
    btn.addEventListener('touchend', ()=>{
      clearTimeout(longPressTimer);
    });
    btn.addEventListener('touchmove', ()=> clearTimeout(longPressTimer), {passive:true});
  });
}
function openOrnPopup(track, step, x, y){
  const current = getOrn(track, step) || 'none';
  ornPop.innerHTML = `<div class="orn-title">${track.toUpperCase()} / STEP ${step+1}</div>` +
    ORNAMENTS.map(o=>`
      <div class="orn-item ${o.id===current?'active':''}" data-track="${track}" data-step="${step}" data-orn="${o.id}">
        <span style="min-width:24px">${o.short||'--'}</span><span>${o.label}</span>
      </div>

  ornPop.style.left = px + 'px';

// AlphaTab score rendering
var _atApi=null, _atDiv=null;

function buildAlphaTex(){
  var spbVal=spb(), ms=state.pattern.measures, bpm=state.pattern.bpm;
  var totalSt=ms*4*spbVal;
  var BS='\u005c';

  var ART={
    kick:'KickHit',             snare:'SnareHit',
    closed_hihat:'HiHatclosed', open_hihat:'HiHatopen',
    crash:'Crashhighhit',       ride:'Ridemiddle',
    cup:'Ridebell',             rimshot:'Snarerimshot',
    tom10:'HighTomhit',         tom12:'HighTomhit',
    tom16:'HighFloorTomhit'
  };

  var UPPER={crash:1,open_hihat:1,closed_hihat:1,ride:1,cup:1,
             snare:1,rimshot:1,tom10:1,tom12:1,tom16:1};
  var LOWER={kick:1};

  // 上声部: 次のヒットまでの距離で音符長
  // 下声部: 最大8分音符(2steps)まで → 符頭が必ず黒塗り
  function stepsToDurUpper(s){return s>=4?'4':s>=2?'8':'16';}
  function stepsToDurLower(s){return s>=2?'8':'16';} // 最大8分、4分以上は使わない

  var slots=[];
  for(var si=0;si<totalSt;si++) slots.push([]);
  state.pattern.events.forEach(function(ev){
    if(ev.step>=0&&ev.step<totalSt) slots[ev.step].push(ev);
  });

  var lines=[];
  lines.push(BS+'hideDynamics');
  lines.push(BS+'track "Drums"');
  lines.push(BS+'instrument percussion');
  lines.push(BS+'tempo '+bpm);
  lines.push(BS+'clef neutral');
  lines.push(BS+'articulation defaults');

  // ── Voice 1: 上声部（ハイハット・スネア・タム）符幹上 ──
  lines.push(BS+'voice');
  for(var m=0;m<ms;m++){
    var barLen=4*spbVal, tokens=[], si2=0;
    while(si2<barLen){
      var evs=(slots[m*barLen+si2]||[]).filter(function(ev){return UPPER[ev.track];});
      if(evs.length>0){
        var dist=barLen-si2;
        for(var nj=si2+1;nj<barLen;nj++){
          if((slots[m*barLen+nj]||[]).some(function(ev){return UPPER[ev.track];})){dist=nj-si2;break;}
        }
        var st=dist>=4?4:dist>=2?2:1;
        var arts=evs.map(function(ev){return ART[ev.track]||'SnareHit';})
                    .filter(function(a,i,arr){return arr.indexOf(a)===i;});
        tokens.push((arts.length===1?arts[0]+'.'+stepsToDurUpper(st)
          :'('+arts.join(' ')+').'+stepsToDurUpper(st))+'{beam up}');
        si2+=st;
      } else {
        var gap=0;
        while(si2+gap<barLen&&!(slots[m*barLen+si2+gap]||[]).some(function(ev){return UPPER[ev.track];})) gap++;
        var rem=gap;
        while(rem>0){var rs=rem>=4?4:rem>=2?2:1;tokens.push('r.'+stepsToDurUpper(rs));rem-=rs;}
        si2+=gap;
      }
    }
    lines.push(tokens.join(' ')+' |');
  }

  // ── Voice 2: 下声部（キックのみ）符幹下 ──
  // 音符長は最大8分音符(2steps)に制限 → 符頭が常に黒塗り
  // 拍境界をまたがない + beam split で連桁を拍内に限定
  lines.push(BS+'voice');
  for(var m3=0;m3<ms;m3++){
    var barLen3=4*spbVal, tokens3=[], si4=0;
    while(si4<barLen3){
      var evs3=(slots[m3*barLen3+si4]||[]).filter(function(ev){return LOWER[ev.track];});
      if(evs3.length>0){
        // 次のキックまでの距離
        var dist3=barLen3-si4;
        for(var nj3=si4+1;nj3<barLen3;nj3++){
          if((slots[m3*barLen3+nj3]||[]).some(function(ev){return LOWER[ev.track];})){dist3=nj3-si4;break;}
        }
        // 拍境界までの距離
        var tillBeat=spbVal-(si4%spbVal);
        // 最大8分(2steps)、かつ拍境界でクリップ
        var st3=Math.min(dist3, tillBeat);
        st3=st3>=2?2:1; // 最大8分に制限（4分以上は使わない）
        var arts3=evs3.map(function(ev){return ART[ev.track]||'KickHit';})
                      .filter(function(a,i,arr){return arr.indexOf(a)===i;});
        var nextSi=si4+st3;
        var isBeatEnd=(nextSi%spbVal===0)&&(nextSi<barLen3);
        var prop='{beam down'+(isBeatEnd?' beam split':'')+'}';
        tokens3.push((arts3.length===1?arts3[0]+'.'+stepsToDurLower(st3)
          :'('+arts3.join(' ')+').'+stepsToDurLower(st3))+prop);
        si4+=st3;
      } else {
        // 休符: 拍内でまとめて最小化
        var beatPos=si4%spbVal;
        var tillB=spbVal-beatPos;
        var distK=tillB;
        for(var nk=si4+1;nk<si4+tillB&&nk<barLen3;nk++){
          if((slots[m3*barLen3+nk]||[]).some(function(ev){return LOWER[ev.track];})){distK=nk-si4;break;}
        }
        var rs=Math.min(distK,tillB);
        rs=rs>=2?2:1; // 最大8分
        tokens3.push('r.'+stepsToDurLower(rs)+'{beam down}');
        si4+=rs;
      }
    }
    lines.push(tokens3.join(' ')+' |');
  }

  var tex=lines.join('\n');
  console.log('[AlphaTex]', tex.slice(0,400));
  return tex;
}

function renderScore(){
  var scoreDiv=document.getElementById('scoreDiv');
  if(!scoreDiv) return;
  if(typeof alphaTab==='undefined'){
    scoreDiv.innerHTML='<div style="color:#9090b8;padding:12px">AlphaTab 読込中...</div>';
    setTimeout(renderScore,800); return;
  }
  var tex=buildAlphaTex();
  if(_atApi&&_atDiv===scoreDiv){
    try{_atApi.tex(tex,[0]);return;}catch(e){_atApi=null;}
  }
  scoreDiv.innerHTML='';
  var wrap=document.createElement('div');
  wrap.style.cssText='background:#fff;border-radius:8px;overflow:auto;min-height:80px;';
  scoreDiv.appendChild(wrap);
  try{
    _atApi=new alphaTab.AlphaTabApi(wrap,{
      core:{engine:'svg',logLevel:0},
      display:{scale:1.0,barsPerRow:4},
      notation:{
        // Voice2の休符を非表示: RestBeat=8, RestHalf=9, RestWhole=10 等
        // alphaTab.NotationElement で定義されているが番号で指定
        elements:{
          8:false,   // RestBeat (quarter/8th/16th rests)
          9:false,   // RestHalf
          10:false,  // RestWhole
        }
      },
      player:{enablePlayer:false}
    });
    _atDiv=scoreDiv;
    _atApi.error.on(function(e){
      console.error('[AlphaTab error]',e);
      scoreDiv.innerHTML='<div style="color:#e05555;padding:8px;font-size:.82rem">譜面エラー: '+(e.message||JSON.stringify(e))+'<br><pre style="font-size:.7rem;overflow:auto;max-height:100px">'+tex.slice(0,300)+'</pre></div>';
      _atApi=null;
    });
    _atApi.tex(tex,[0]);
  }catch(e){
    console.error('[AlphaTab init]',e);
    scoreDiv.innerHTML='<div style="color:#e05555;padding:8px">初期化エラー: '+e.message+'</div>';
    _atApi=null;
  }
}

function ensureAudio(){
  if(!state.audioContext){
    state.audioContext = new (window.AudioContext || window.webkitAudioContext)();
    _masterGain=null;
  }
  if(state.audioContext.state === 'suspended'){

  }

}
function buildReverbMix(amount=0){
  const ctx = state.audioContext;
  if(!ctx || amount<=0) return null;
  const len = ctx.sampleRate * 1.2;
  const imp = ctx.createBuffer(2, len, ctx.sampleRate);
  for(let ch=0; ch<2; ch++){
    const data = imp.getChannelData(ch);
    for(let i=0;i<len;i++){
      data[i] = (Math.random()*2-1) * Math.pow(1 - i/len, 2.4);
    }
  }
  const conv = ctx.createConvolver();
  conv.buffer = imp;
  const wet = ctx.createGain();
  wet.gain.value = Math.max(0, Math.min(0.35, amount/100));
  conv.connect(wet).connect(ctx.destination);
  return conv;
}
function playNoise(time, dur, filterHz, vol, reverb=0, decay=-1){
  const ctx = state.audioContext;
  const actualDecay = decay < 0 ? dur : decay;
  const bufferSize = Math.max(1, Math.floor(ctx.sampleRate * dur));
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for(let i=0;i<bufferSize;i++) data[i] = Math.random()*2-1;
  const src = ctx.createBufferSource();
  src.buffer = buffer;
  const filter = ctx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = filterHz;
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(vol*0.5, time);
  gain.gain.exponentialRampToValueAtTime(0.0001, time + actualDecay);
  const reverbNode = buildReverbMix(reverb);
  src.connect(filter).connect(gain).connect(ctx.destination);
  if(reverbNode) filter.connect(reverbNode);
  src.start(time);
  src.stop(time + dur);
}
function playTone(time, f1, f2, dur, vol, wave='sine', reverb=0, attack=0.001){
  const ctx = state.audioContext;
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  const filter = ctx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = Math.max(400, f1*8);
  o.type = wave;
  o.frequency.setValueAtTime(f1, time);
  o.frequency.exponentialRampToValueAtTime(Math.max(20, f2), time + dur);
  g.gain.setValueAtTime(0.0001, time);
  g.gain.linearRampToValueAtTime(vol*0.5, time + attack);
  g.gain.exponentialRampToValueAtTime(0.0001, time + dur);
  const reverbNode = buildReverbMix(reverb);
  o.connect(filter).connect(g).connect(ctx.destination);
  if(reverbNode) filter.connect(reverbNode);
  o.start(time);
  o.stop(time + dur + 0.02);
}

// デフォルトプリセット（全パート）
var _globalPreset = 'acoustic';

function getPresetForTrack(trackId){
  return SYNTH_PRESETS[_trackPreset[trackId] || _globalPreset] || SYNTH_PRESETS['acoustic'];
}

function playTrackAt(trackId, time, velocityScale=1){
  const tr = TRACKS.find(t=>t.id===trackId);
  if(!tr) return;
  const v = Math.max(0.05, Math.min(1.2, velocityScale));
  const preset = getPresetForTrack(trackId);
  const fn = preset[trackId];
  if(fn){ fn(time, v); return; }
  // fallback（未定義楽器）
  playNoise(time, 0.05, 1000, v*0.2, 0, 0.04);
}
function fireWithOrn(trackId, step, time, baseVel){
  // カスタムサンプルがあれば優先再生
  var _s=_S&&_S[trackId];
  if(_s&&_s.buffer&&state.audioContext){
    var _src=state.audioContext.createBufferSource();
    var _g=state.audioContext.createGain();
    _src.buffer=_s.buffer;
    _g.gain.setValueAtTime(Math.min(1.2,Math.max(0.05,baseVel)),time);
    _src.connect(_g).connect(state.audioContext.destination);
    _src.start(time);
    return;
  }
  const orn = getOrn(trackId, step);
  const grace = 0.035;
  if(!orn){
    playTrackAt(trackId, time, baseVel);
    return;
  }
  switch(orn){
    case 'flam':
      playTrackAt(trackId, time - grace, baseVel*0.45);
      playTrackAt(trackId, time, baseVel);
      break;
    case 'drag':
      playTrackAt(trackId, time - grace*2.2, baseVel*0.38);
      playTrackAt(trackId, time - grace, baseVel*0.5);
      playTrackAt(trackId, time, baseVel);
      break;
    case 'ghost':
      playTrackAt(trackId, time, baseVel*0.22);
      break;
    case 'accent':
      playTrackAt(trackId, time, Math.min(1.2, baseVel*1.25));
      break;
    case 'rim':
      playTrackAt('rimshot', time, baseVel);
      break;
    case 'cross':
      playTrackAt('rimshot', time, baseVel*0.55);
      break;
    case 'buzz':
      playTrackAt(trackId, time - 0.02, baseVel*0.35);
      playTrackAt(trackId, time - 0.01, baseVel*0.45);
      playTrackAt(trackId, time, baseVel);
      break;
    default:
      playTrackAt(trackId, time, baseVel);
  }
}
function secondsPerBeat(){
  return 60 / state.pattern.bpm;
}
function secondsPerStep(){
  return secondsPerBeat() / spb();
}
function stepOffset(step){
  const feel = state.pattern.feelMode;
  if(feel === 'straight') return 0;
  const p = spb();
  const posInBeat = step % p;
  if(feel === 'swing8'){
    if(p >= 2 && posInBeat % 2 === 1){
      return secondsPerStep() * 0.33;
    }
    return 0;
  }
  if(feel === 'shuffle16'){
    if(p >= 4 && posInBeat === 1){
      return secondsPerStep() * 0.18;
    }
    if(p >= 4 && posInBeat === 3){
      return secondsPerStep() * 0.08;
    }
  }
  return 0;
}
function scheduler(){
  const ctx = state.audioContext;
  if(!ctx || !state.isPlaying) return;
  const tot = totalSteps();
  while(state.nextNoteTime < ctx.currentTime + state.scheduleAheadTime){
    const step = state.scheduleStep;
    const events = state.pattern.events.filter(e=>e.step===step);
    const scheduledTime = state.nextNoteTime + stepOffset(step);
    for(const ev of events){
      const vel = Math.max(0.3, Math.min(1, (ev.velocity||100)/127));
      fireWithOrn(ev.track, step, scheduledTime, vel);
    }
    // 表示更新はsetTimeoutで（スケジュール時刻に合わせて）
    const capturedStep = step;
    const delay = Math.max(0, (scheduledTime - ctx.currentTime) * 1000);
    setTimeout(()=>{
      if(!state.isPlaying) return;
      state.drawStep = capturedStep;
      renderPlayhead();
    }, delay);

    state.nextNoteTime += secondsPerStep();
    state.scheduleStep = (step + 1) % tot;
  }
}
async function startPlayback(){
  if(state.isPlaying) return;
  await ensureAudio();
  state.isPlaying = true;
  state.scheduleStep = 0;
  state.drawStep = 0;
  state.nextNoteTime = state.audioContext.currentTime + 0.05;
  renderGrid();
  state.schedulerId = setInterval(scheduler, state.lookahead);
}
function stopPlayback(){
  state.isPlaying = false;
  if(state.schedulerId) clearInterval(state.schedulerId);
  state.schedulerId = null;
  state.scheduleStep = 0;
  state.drawStep = 0;
  renderGrid();
}

function setGridMode(mode){
  stopPlayback();
  const oldTotal = totalSteps();
  state.pattern.gridMode = mode;
  const newTotal = totalSteps();
  state.pattern.events = state.pattern.events.filter(e=>e.step < newTotal);
  Object.keys(state.pattern.ornaments).forEach(k=>{
    const parts = k.split('|');
    const step = Number(parts[2]);
    if(step >= newTotal) delete state.pattern.ornaments[k];
  });
  savePattern();
  renderAll();
}
function setMeasures(value){
  stopPlayback();
  state.pattern.measures = clampMeasures(value);
  const max = totalSteps();
  state.pattern.events = state.pattern.events.filter(e=>e.step < max);
  Object.keys(state.pattern.ornaments).forEach(k=>{
    const step = Number(k.split('|')[2]);
    if(step >= max) delete state.pattern.ornaments[k];
  });
  savePattern();
  renderAll();
}

  state.pattern.bpm = clampBpm(v);

function encodeVarLen(value){
  let buffer = value & 0x7f;
  const bytes = [];
  while((value >>= 7)){
    buffer <<= 8;
    buffer |= (value & 0x7f) | 0x80;
  }
  while(true){
    bytes.push(buffer & 0xff);
    if(buffer & 0x80) buffer >>= 8; else break;
  }
  return bytes;
}
function numberToBytes(value, len){
  const out = new Array(len).fill(0);
  for(let i=len-1;i>=0;i--){
    out[i] = value & 0xff;
    value >>= 8;
  }
  return out;
}
function stringToBytes(v){ return Array.from(v).map(c=>c.charCodeAt(0)); }
function exportMidi(){
  const TPQ = 480;
  const stepTicks = TPQ / spb();
  const noteLen = Math.max(30, Math.floor(stepTicks * 0.75));
  const midiEvents = [];
  const mpq = Math.round(60000000 / state.pattern.bpm);
  midiEvents.push({tick:0,data:[0xff,0x51,0x03,...numberToBytes(mpq,3)]});
  for(const ev of state.pattern.events){
    const tr = TRACKS.find(t=>t.id===ev.track);
    if(!tr) continue;
    const tick = Math.round(ev.step * stepTicks);
    const velocity = Math.max(1, Math.min(127, ev.velocity || 100));
    const orn = getOrn(ev.track, ev.step);
    let note = tr.midiNote;
    if(orn === 'rim' || orn === 'cross') note = 37;
    midiEvents.push({tick,data:[0x99,note,velocity]});
    midiEvents.push({tick:tick+noteLen,data:[0x89,note,0x00]});
  }
  midiEvents.push({tick:Math.round(totalSteps()*stepTicks)+1,data:[0xff,0x2f,0x00]});
  midiEvents.sort((a,b)=>a.tick-b.tick);
  const trackBytes = [];
  let prev = 0;
  for(const e of midiEvents){
    const delta = e.tick - prev;
    trackBytes.push(...encodeVarLen(delta), ...e.data);
    prev = e.tick;
  }
  const header = [...stringToBytes('MThd'),...numberToBytes(6,4),...numberToBytes(0,2),...numberToBytes(1,2),...numberToBytes(TPQ,2)];
  const track = [...stringToBytes('MTrk'),...numberToBytes(trackBytes.length,4),...trackBytes];
  const bytes = new Uint8Array([...header, ...track]);
  const blob = new Blob([bytes], {type:'audio/midi'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'drum-pattern.mid'; a.click();
  URL.revokeObjectURL(url);
}

  var inp=document.createElement('input');inp.type='file';inp.accept='audio/*';
  inp.onchange=function(e){
    var f=e.target.files[0];if(!f)return;
    ensureAudio().then(function(){
      f.arrayBuffer().then(function(ab){
        state.audioContext.decodeAudioData(ab,
          function(buf){_S[tid]={buffer:buf,name:f.name};var el=document.getElementById('src_'+tid);if(el)el.textContent='OK '+f.name;},
          function(err){alert('Error: '+err);});
      });
    });

function togRec(tid){
  var btn=document.getElementById('rec_'+tid);
  if(_R.mr&&_R.mr.state==='recording'){_R.mr.stop();btn.innerHTML='&#127897;';return;}
  ensureAudio().then(function(){
    navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
      _R.chunks=[];_R.track=tid;_R.mr=new MediaRecorder(stream);
      _R.mr.ondataavailable=function(e){_R.chunks.push(e.data);};
      _R.mr.onstop=function(){
        stream.getTracks().forEach(function(t){t.stop();});
        new Blob(_R.chunks,{type:'audio/webm'}).arrayBuffer().then(function(ab){
          state.audioContext.decodeAudioData(ab,function(buf){
            _S[tid]={buffer:buf,name:'REC'};
            var el=document.getElementById('src_'+tid);if(el)el.textContent='OK REC';
          });
        });
      };
      _R.mr.start();btn.innerHTML='&#9209;';
    }).catch(function(err){alert('Mic error: '+err.message);});
  });
}

// ============================================================
// ドラム音源解析エンジン
// ============================================================
const _AZ_SR=22050,_AZ_FRAME=1024,_AZ_HOP=512;
function _azBandPower(mag,lo,hi,fs,sr){
  var l=Math.round(lo/(sr/fs)),h=Math.min(Math.round(hi/(sr/fs)),mag.length-1),s=0;
  for(var i=l;i<=h;i++) s+=mag[i]*mag[i]; return s/Math.max(1,h-l+1);
}
async function _azResample(buf){
  var dur=Math.min(buf.duration,240),frames=Math.ceil(dur*_AZ_SR);
  var off=new OfflineAudioContext(1,frames,_AZ_SR),src=off.createBufferSource();
  src.buffer=buf; src.connect(off.destination); src.start(0); return off.startRendering();
}
function _azOnsets(mono){
  var s=mono.getChannelData(0),sr=mono.sampleRate,half=_AZ_FRAME/2;
  var nf=Math.floor((s.length-_AZ_FRAME)/_AZ_HOP),prev=new Float32Array(half),flux=[];
  var hann=new Float32Array(_AZ_FRAME);
  for(var n=0;n<_AZ_FRAME;n++) hann[n]=0.5*(1-Math.cos(2*Math.PI*n/(_AZ_FRAME-1)));
  for(var f=0;f<nf;f++){
    var st=f*_AZ_HOP,win=new Float32Array(_AZ_FRAME);
    for(var i=0;i<_AZ_FRAME;i++) win[i]=(s[st+i]||0)*hann[i];
    var mag=new Float32Array(half);
    for(var k=0;k<half;k++){
      var re=0,im=0;
      for(var n2=0;n2<_AZ_FRAME;n2++){var a=2*Math.PI*k*n2/_AZ_FRAME;re+=win[n2]*Math.cos(a);im-=win[n2]*Math.sin(a);}
      mag[k]=Math.sqrt(re*re+im*im);
    }
    var fl=0; for(var k2=0;k2<half;k2++){var d=mag[k2]-prev[k2];if(d>0)fl+=d;}
    flux.push({t:st/sr,f:fl}); prev.set(mag);
  }
  var W=20,onsets=[];
  for(var i=W;i<flux.length-W;i++){
    var loc=flux.slice(i-W,i+W).map(function(x){return x.f;});
    var mean=loc.reduce(function(a,b){return a+b;},0)/loc.length;
    if(flux[i].f>mean*1.5+0.001&&flux[i].f>flux[i-1].f&&flux[i].f>flux[i+1].f) onsets.push(flux[i].t);
  }
  return onsets;
}
function _azBPM(onsets){
  if(onsets.length<4) return 120;
  var ivs=[],bins={};
  for(var i=1;i<Math.min(onsets.length,80);i++){var d=onsets[i]-onsets[i-1];if(d>0.1&&d<2.0)ivs.push(d);}
  if(!ivs.length) return 120;
  ivs.forEach(function(iv){var b=Math.round(60/iv);for(var bb=b-2;bb<=b+2;bb++)bins[bb]=(bins[bb]||0)+1;});
  var best=120,bestN=0;
  Object.keys(bins).forEach(function(b){var bv=parseInt(b);if(bv>=60&&bv<=200&&bins[b]>bestN){bestN=bins[b];best=bv;}});
  return best;
}
function _azClassify(onsets,mono){
  var sr=mono.sampleRate,s=mono.getChannelData(0),fs=1024,half=512;
  var hann=new Float32Array(fs);
  for(var n=0;n<fs;n++) hann[n]=0.5*(1-Math.cos(2*Math.PI*n/(fs-1)));
  return onsets.map(function(t){
    var st=Math.max(0,Math.floor(t*sr)),win=new Float32Array(fs);
    for(var i=0;i<fs;i++) win[i]=(s[st+i]||0)*hann[i];
    var mag=new Float32Array(half);
    for(var k=0;k<half;k++){
      var re=0,im=0;
      for(var n2=0;n2<fs;n2++){var a=2*Math.PI*k*n2/fs;re+=win[n2]*Math.cos(a);im-=win[n2]*Math.sin(a);}
      mag[k]=Math.sqrt(re*re+im*im);
    }
    var kP=_azBandPower(mag,20,200,fs,sr),sP=_azBandPower(mag,180,2000,fs,sr),hP=_azBandPower(mag,5000,18000,fs,sr);
    var track=kP>sP*1.8&&kP>hP*2.5?'kick':hP>kP*3&&hP>sP*0.8?'closed_hihat':'snare';
    return {timeSeconds:t,track:track,velocity:Math.round(Math.min(1,(kP+sP+hP))*80+40)};
  });
}
function _azSnap(events,bpm,measures){
  var spbVal=spb(),stepDur=(60/bpm)/spbVal,totalSt=measures*4*spbVal;
  state.pattern.events=state.pattern.events.filter(function(e){return !e._auto;});
  events.forEach(function(ev){
    var idx=Math.round(ev.timeSeconds/stepDur);
    if(idx<0||idx>=totalSt) return;
    if(!state.pattern.events.find(function(e){return e.track===ev.track&&e.step===idx;}))
      state.pattern.events.push({track:ev.track,step:idx,velocity:ev.velocity,_auto:true});
  });
  state.pattern.events.sort(function(a,b){return a.step-b.step;});
}
function _sleep(ms){return new Promise(function(r){setTimeout(r,ms);});}

async function runAnalysis(){
  var file=document.getElementById('analyzeFileInput').files[0]; if(!file) return;
  var bpmHint=parseInt(document.getElementById('analyzeBpmHint').value)||0;
  var bars=parseInt(document.getElementById('analyzeBarsHint').value)||4;
  var progWrap=document.getElementById('analyzeProgWrap');
  var progBar=document.getElementById('analyzeProgBar');
  var progLabel=document.getElementById('analyzeProgLabel');
  var resultMsg=document.getElementById('analyzeResultMsg');
  var startBtn=document.getElementById('analyzeStartBtn');
  function prog(p,m){progBar.style.width=(p*100)+'%';progLabel.textContent=m;}
  startBtn.disabled=true; progWrap.style.display='block'; resultMsg.style.display='none';
  try{
    await ensureAudio();
    prog(0.05,'音源を読み込み中...');
    var ab=await file.arrayBuffer();
    var audioBuf=await state.audioContext.decodeAudioData(ab);
    prog(0.15,'モノラル変換中...'); await _sleep(20);
    var mono=await _azResample(audioBuf);
    prog(0.30,'オンセット検出中...'); await _sleep(20);
    var onsets=_azOnsets(mono);
    prog(0.55,onsets.length+'個検出。BPM推定中...'); await _sleep(20);
    var bpm=Math.max(40,Math.min(240,bpmHint||_azBPM(onsets)));
    prog(0.70,'BPM:'+bpm+'。周波数分類中...'); await _sleep(20);
    var events=_azClassify(onsets,mono);
    prog(0.88,'グリッドに配置中...'); await _sleep(10);
    state.pattern.measures=bars; state.pattern.bpm=bpm; state.pattern.gridMode='s';
    _azSnap(events,bpm,bars);
    prog(1.0,'完了'); savePattern(); _atApi=null; renderAll();
    resultMsg.style.display='block';
    resultMsg.textContent='✓ BPM:'+bpm+' / '+events.length+'件 → '+state.pattern.events.length+'ステップ配置';
    await _sleep(1800);
    document.getElementById('analyzeModal').style.display='none';
  }catch(e){progLabel.textContent='⚠ エラー: '+e.message; console.error(e);}
  finally{startBtn.disabled=false;}
}
document.getElementById('analyzeBtn').addEventListener('click',function(){
  document.getElementById('analyzeModal').style.display='flex';
});
document.getElementById('analyzeFileInput').addEventListener('change',function(e){
  var f=e.target.files[0]; if(!f) return;
  document.getElementById('analyzeFileName').textContent=f.name;
  document.getElementById('analyzeStartBtn').disabled=false;
  document.getElementById('analyzeProgWrap').style.display='none';
  document.getElementById('analyzeResultMsg').style.display='none';
});
document.getElementById('analyzeStartBtn').addEventListener('click',runAnalysis);

renderAll();
savePattern();
